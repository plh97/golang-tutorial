name: GitHub Actions CICD
run-name: ${{ github.actor }} Deploy Test Ohayo CMS 🚀
on:
  push:
    branches:
      - "main"
jobs:
  Ansible-Actions:
    runs-on: ubuntu-latest
    # 核心修改：使用您刚刚构建的 Docker 镜像作为运行环境
    container:
      image: ghcr.io/plh97/ansible-v7-ci:latest # 🚨 替换为您在 build-image.yml 中使用的完整镜像地址
    
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3
      # --- 移除 Ansible 安装和 Cache 步骤 ---
      # ⚠️ 注意：由于您在 Dockerfile 中已经安装了 openssh-client，
      # 理论上以下步骤应该直接在容器内工作。

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          name: id_ed25519
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"
          config: |
            Host vultr
              HostName 43.165.190.31
              CheckHostIP no
              Port 22
              User root

      - name: Adding Known Hosts
        run: ssh-keyscan -H 43.165.190.31 >> ~/.ssh/known_hosts

      - name: Run ansible
        run: |
          cd ~/.ssh/ && ls &&
          cd $GITHUB_WORKSPACE/ansible && ansible-playbook test-ohayo.yml


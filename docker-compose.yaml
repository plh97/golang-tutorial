version: "3.8"

services:
  mysql:
    image: mysql:8.0.39
    container_name: ohayo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: gorm_db_new
      MYSQL_ROOT_HOST: "%"
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p 123456"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: ohayo-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: ohayo-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: 123456
      #  PMA_HOST: 43.165.190.31
      #  PMA_PORT: 3306
      #  PMA_USER: ohayo
      #  PMA_PASSWORD: fKnCrMKCeMjaG5Mf
      # PMA_HOST: 43.165.134.93
      # PMA_PORT: 3306
      # PMA_USER: ohayo
      # PMA_PASSWORD: 3RaHx4GiKwj2tka6
    ports:
      - "8080:80"
    depends_on:
      - mysql

  # web:
  #   image: nginx:latest
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./frontend/nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./frontend/nginx/testh5.ohayo.date.crt:/etc/nginx/ssl/testh5.ohayo.date.crt
  #     - ./frontend/nginx/testh5.ohayo.date.key:/etc/nginx/ssl/testh5.ohayo.date.key

  
volumes:
  mysql-data:
  redis-data: